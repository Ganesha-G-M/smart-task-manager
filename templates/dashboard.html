<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background-color: #f4f6f9;">

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Smart Task Manager</h2>
        <a class="btn btn-dark" href="/logout">Logout</a>
    </div>

    <!-- Add Task Card -->
    <div class="card p-4 mb-4 shadow-sm">
        <h5>Add New Task</h5>

        <form method="POST">
            <div class="row">
                <div class="col-md-4">
                    <input class="form-control" name="title" placeholder="Task Title" required>
                </div>

                <div class="col-md-3">
                    <select class="form-control" name="category">
                        <option>Work</option>
                        <option>Study</option>
                        <option>Personal</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <input class="form-control" type="date" name="due_date" required>
                </div>

                <div class="col-md-2">
                    <button class="btn btn-primary w-100">Add</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Task Table -->
    <div class="card p-3 shadow-sm">
        <h5>Your Tasks</h5>

        <table class="table table-hover mt-3">
            <thead class="table-dark">
            <tr>
                <th>Task</th>
                <th>Category</th>
                <th>Date</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>

            <tbody>
            {% for task in tasks %}
            <tr>
                <td>{{ task[2] }}</td>
                <td>{{ task[3] }}</td>
                <td>{{ task[4] }}</td>

                <td>
                    {% if task[5] == "Completed" %}
                    <span class="badge bg-success">Completed</span>
                    {% else %}
                    <span class="badge bg-warning text-dark">Pending</span>
                    {% endif %}
                </td>

                <td>
                    {% if task[5] == "Pending" %}
                    <a class="btn btn-success btn-sm" href="/complete/{{ task[0] }}">Complete</a>
                    {% endif %}
                    <a class="btn btn-danger btn-sm" href="/delete/{{ task[0] }}">Delete</a>
                </td>
            </tr>
            {% endfor %}
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
